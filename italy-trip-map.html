)"},{"z":"z1","c":"market","n":"Eurospin (San Martino)","lat":45.4216,"lng":11.0889,"d":"4.2★ (特大型折扣)｜位於東側高速公路出口旁，義大利公認物價最低的折扣巨頭，適合出發健行前囤貨。","q":"Eurospin (San Martino)"},{"z":"z1","c":"market","n":"ALDI (Viale del Lavoro)","lat":45.4127,"lng":10.985,"d":"4.4★ (大型折扣)｜靠近維羅納展覽中心，德系平價大廠，健行隨身堅果包、保久乳 CP 值最高。","q":"ALDI (Viale del Lavoro)"},{"z":"z1","c":"market","n":"NaturaSì (Via Carlo Cipolla)","lat":45.4421,"lng":11.018,"d":"4.4★ (中型有機)｜專營威尼托在地有機農夫蔬果、無添加劑乾酪、全天然防蚊液與高山防曬乳。","q":"NaturaSì (Via Carlo Cipolla)"},{"z":"z1","c":"sight","n":"Funivia Malcesine - Monte Baldo","lat":45.7664,"lng":10.8112,"d":"4.8★｜位於加達湖東岸，全景 360 度旋轉玻璃大纜車，直達 1700m 的巴爾多山頂峰。"},{"z":"z1","c":"sight","n":"Funicolare di Castel San Pietro","lat":45.4483,"lng":11.0012,"d":"4.7★｜位於羅馬劇場旁，搭乘透明玻璃索道 1 分鐘登頂，俯瞰紅磚老城與 S 型阿迪傑河。"},{"z":"z1","c":"sight","n":"Piazza delle Erbe (百草廣場)","lat":45.4434,"lng":10.9973,"d":"4.7★｜曾是古羅馬廣場，環繞著巴洛克與文藝復興壁畫木屋、朗貝爾蒂塔，市井活力十足。"},{"z":"z1","c":"sight","n":"Basilica di San Zeno Maggiore","lat":45.4427,"lng":10.9787,"d":"4.7★｜義大利最傑出的羅曼式建築之一，內部保存大師祭壇畫，傳說中悲劇婚禮地下室。"},{"z":"z1","c":"sight","n":"Giusti Gardens (朱斯蒂花園)","lat":45.4416,"lng":11.008,"d":"4.5★｜文藝復興幾何對稱花園，擁有古老高聳的絲柏樹群與綠籬迷宮，歌德曾在此漫步。"},{"z":"z1","c":"hike","n":"維羅納歷史防禦城牆步道","lat":45.4374,"lng":10.9919,"d":"步道起點｜登山口：Piazza Bra 古老雙拱城門下方。沿著斯卡利傑家族紅磚壕溝遺址漫步。"},{"z":"z1","c":"hike","n":"加達湖：巴多利諾至加達湖畔步道","lat":45.5516,"lng":10.7187,"d":"步道起點｜登山口：Bardolino 碼頭北側廣場水岸。極平緩的沿湖紅磚大道，伴隨天鵝與別墅。"},{"z":"z1","c":"hike","n":"加達湖：聖皮格利歐全景步道","lat":45.5814,"lng":10.6939,"d":"步道起點｜登山口：Punta San Vigilio 公路對面小斜坡。穿過橄欖林，俯瞰加達湖最美半島。"},{"z":"z1","c":"hike","n":"巴爾多山：卡爾塔高山草甸小徑","lat":45.7664,"lng":10.8112,"d":"步道起點｜登山口：Monte Baldo 旋轉纜車山頂站出口。漫步狹長山脊，左手深藍湖泊右手阿爾卑斯。"},{"z":"z1","c":"hike","n":"瓦爾波利切拉：莫利尼瀑布環線","lat":45.5616,"lng":10.912,"d":"步道起點｜登山口：Molina 古老石頭村落付費停車場。穿梭石灰岩峽谷、水車磨坊與飛瀑。"},{"z":"z1","c":"shop","n":"Signorvino (Piazza Bra)","lat":45.4391,"lng":10.993,"d":"4.6★｜全國旗艦創始店，直面圓形劇場。全城最龐大的 Amarone 頂級紅酒與 Recioto 甜酒牆。","q":"Signorvino (Piazza Bra)"},{"z":"z1","c":"shop","n":"Pasticceria Cordioli","lat":45.4427,"lng":10.9979,"d":"4.5★｜隱藏在茱麗葉之家旁的百年糕點老店，必買限定的「茱麗葉的初吻」精裝鐵盒餅乾。","q":"Pasticceria Cordioli Verona"},{"z":"z1","c":"shop","n":"Enoteca Oreste Dal Zovo","lat":45.4454,"lng":10.9942,"d":"4.7★｜深受在地老饕器重的私房酒窖，老爺子對在地小酒莊自然酒與老 Amarone 瞭若指掌。","q":"Enoteca Oreste Dal Zovo Verona"},{"z":"z1","c":"shop","n":"Caffè Wallner","lat":45.4397,"lng":10.9957,"d":"4.4★｜高端現代烘焙甜點工坊，主打融合在地葡萄酒香氣的手工巧克力、黑夾心牛軋糖。","q":"Caffè Wallner Verona"},{"z":"z1","c":"shop","n":"Frantoio Redoro (Lake Garda Shop)","lat":45.5116,"lng":10.7319,"d":"4.6★｜頂級冷壓初榨橄欖油老牌。橄欖油帶有加達湖東岸獨特草本香氣，售手作油潤膚皂。","q":"Frantoio Redoro (Lake Garda Shop)"}], CAT={"sight": "#3C6A4A", "food": "#D24A2C", "market": "#2E6DB4", "shop": "#C2569B", "park": "#C99A2E", "hotel": "#7A4FA3", "hike": "#117A65"}, CATLAB={"sight": "景點", "food": "餐廳", "market": "超市", "shop": "購物", "park": "停車/交通", "hotel": "住宿", "hike": "健行步道"}, ZONES=[["z7", "6/15 義→瑞 沿途補給"], ["z8", "6/15–17 策馬特"], ["z9", "6/17–20 少女峰"], ["z10", "6/20 琉森（順路）"], ["z11", "6/20–21 Imst/茵斯布魯克"], ["z6", "6/21 多洛米堤西 Seceda"], ["z12", "6/21–25 多洛米堤東 Cortina"], ["z1", "6/25 維羅納"], ["z2", "6/25 維羅納周邊超市"], ["z3", "6/26 米蘭市中心"], ["z4", "6/25–27 米蘭 Sesto 住宿"], ["z5", "6/27 往機場 MXP"]];
  var map=L.map('map',{zoomControl:true}).setView([46.4,9.4],6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,subdomains:'abc',attribution:'&copy; OpenStreetMap'}).addTo(map);
  function pinIcon(color){return L.divIcon({className:'',iconSize:[16,16],iconAnchor:[8,16],popupAnchor:[0,-15],
    html:'<span style="display:block;width:16px;height:16px;border-radius:50% 50% 50% 0;background:'+color+';transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.45)"></span>'});}
  var items=DATA.map(function(p){
    var m=L.marker([p.lat,p.lng],{icon:pinIcon(CAT[p.c])});
    var nav=p.q?('https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(p.q)):('https://www.google.com/maps/dir/?api=1&destination='+p.lat+','+p.lng);
    m.bindPopup('<div class="pn">'+p.n+'</div><div class="pcat" style="background:'+CAT[p.c]+'">'+CATLAB[p.c]+'</div><div class="pd">'+p.d+'</div><a class="pnav" target="_blank" href="'+nav+'">📍 Google 導航</a>',{maxWidth:260});
    return {m:m,z:p.z,c:p.c,lat:p.lat,lng:p.lng};
  });
  var curZone='all'; var catOn={}; Object.keys(CAT).forEach(function(k){catOn[k]=true;});
  function refresh(){var pts=[];items.forEach(function(it){
      var show=(curZone==='all'||it.z===curZone)&&catOn[it.c];
      if(show){if(!map.hasLayer(it.m))it.m.addTo(map);pts.push([it.lat,it.lng]);}
      else{if(map.hasLayer(it.m))map.removeLayer(it.m);}});
    if(pts.length)map.fitBounds(pts,{padding:[40,40],maxZoom:15});}
  var zc=document.getElementById('zones');
  function mkZB(id,label){var b=document.createElement('button');b.className='zb'+(id==='all'?' on':'');b.textContent=label;
    b.onclick=function(){curZone=id;[].forEach.call(zc.children,function(x){x.classList.remove('on');});b.classList.add('on');refresh();};zc.appendChild(b);}
  mkZB('all','全部');ZONES.forEach(function(z){mkZB(z[0],z[1]);});
  var lg=document.getElementById('legend');
  lg.innerHTML='<div class="lgh" id="lgh">🗂 圖例 ▸</div><div class="lgbody" id="lgbody"></div>';
  var lgbody=document.getElementById('lgbody');
  Object.keys(CAT).forEach(function(k){var row=document.createElement('div');row.className='lg';
    row.innerHTML='<span class="dot" style="background:'+CAT[k]+'"></span>'+CATLAB[k];
    row.onclick=function(){catOn[k]=!catOn[k];row.classList.toggle('off',!catOn[k]);refresh();};lgbody.appendChild(row);});
  document.getElementById('lgh').onclick=function(){var o=lg.classList.toggle('open');this.innerHTML=o?'🗂 圖例 ▾（點分類可開關）':'🗂 圖例 ▸';};
  document.getElementById('lgh').onclick(); // 預設展開於左下角，點標題可收合
  refresh();
</script>
